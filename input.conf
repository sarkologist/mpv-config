R cycle-values video-rotate "90" "180" "270" "0"

# Force common navigation keys to use keyframe seeks for maximum speed.
LEFT seek -1 keyframes
RIGHT seek 1 keyframes
Shift+LEFT seek -5 keyframes
Shift+RIGHT seek 5 keyframes
DOWN seek -60 keyframes
UP seek 60 keyframes
Shift+DOWN seek -300 keyframes
Shift+UP seek 300 keyframes
WHEEL_LEFT seek -10 keyframes
WHEEL_RIGHT seek 10 keyframes

# Right-hand home-row seeking (shift amplifies distance).
j repeatable seek -60 keyframes
k repeatable seek -1 keyframes
l repeatable seek 1 keyframes
; repeatable seek 60 keyframes
J repeatable seek -300 keyframes
K repeatable seek -5 keyframes
L repeatable seek 5 keyframes
: repeatable seek 300 keyframes

# Reassign defaults displaced by the home-row seek map.
' cycle sub
\" cycle sub down
a ab-loop
A cycle-values loop-file "inf" "no"
