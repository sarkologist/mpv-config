no-native-fs
screenshot-template="%X{~~desktop}/%F-%p-%n"

# Fastest seeking: jump to the nearest keyframe instead of decoding to
# the exact requested timestamp.
hr-seek=no
hr-seek-framedrop=yes

# Keep more nearby data seekable in memory so repeated jumps are snappier.
cache=yes
demuxer-seekable-cache=yes
demuxer-readahead-secs=20
demuxer-max-bytes=512MiB
demuxer-max-back-bytes=512MiB

# Favor decoder speed over strictness/quality during heavy navigation.
vd-lavc-fast=yes
vd-lavc-skiploopfilter=nonkey

# Reduce UI work on every seek.
osd-on-seek=no
